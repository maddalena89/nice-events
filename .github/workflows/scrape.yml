name: Scrape and publish

on:
  schedule:
    - cron: "0 5 * * *"        # 05:00 UTC = 07:00 Nice (06:00 in winter)
  workflow_dispatch:           # manual "Run workflow" button
  push:
    branches: [main]
    paths: ["niceevents/**", "templates/**", ".github/workflows/**"]

permissions:
  contents: write              # to commit the refreshed db
  pages: write
  id-token: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Test
        run: pytest tests/ -q

      # A source can break without the run failing — we still want the other
      # 7 sources published. `|| true` keeps a partial scrape useful; the step
      # summary below is where you actually see what broke.
      # SUPABASE_SERVICE_KEY bypasses Row Level Security, so it is scoped to this
      # step alone — the step that reads approved submissions. It is deliberately
      # NOT present in "Build site" below, because that step renders a public HTML
      # file and nothing that can read submitter emails belongs anywhere near it.
      - name: Scrape
        env:
          PYTHONUNBUFFERED: "1"
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m niceevents.run scrape -v 2>&1 | tee scrape.log || true

      # Only the anon key here. Both of these end up inside index.html by design;
      # see the note in site.py.
      - name: Build site
        env:
          SITE_TITLE: "What's on in Nice"
          GITHUB_REPO: ${{ github.repository }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          # SUBMIT_ENDPOINT: ${{ secrets.SUBMIT_ENDPOINT }}   # if you use Formspree
        run: python -m niceevents.run build --out dist

      - name: Report
        if: always()
        run: |
          {
            echo "### Scrape result"
            echo '```'
            tail -25 scrape.log || echo "no log"
            echo '```'
            grep -iE "FAILED|returned NOTHING" scrape.log && echo "⚠️ some sources need attention" || true
          } >> "$GITHUB_STEP_SUMMARY"

      # Saving the db is a nice-to-have (it's what makes "new this week" work).
      # If the push ever conflicts, that must NOT stop the site from deploying —
      # a stale database is a small problem, a site that won't publish is a big one.
      - name: Commit database
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/events.db
          git diff --staged --quiet || git commit -m "data: refresh $(date -u +%Y-%m-%d)"
          git push

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
